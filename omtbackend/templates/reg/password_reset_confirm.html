{% extends "header/header.html" %}
{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="auth-main">
  <div class="card">
    <div class="body body-main">
      <h3>Set New Password</h3>
      <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success mt-3">Change Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
