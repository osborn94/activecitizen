
{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Password Reset</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
      padding: 20px;
    }
    .email-container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .btn {
      background-color: #28a745;
      padding: 10px 20px;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      display: inline-block;
      margin-top: 20px;
    }
    .logo {
      width: 100px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="email-container">
    <img class="logo" src="{{ protocol }}://{{ domain }}{% static 'assets/images/logo-removebg-preview.png' %}" alt="Logo" />

    <h2>Hello {{ user.get_username }},</h2>

    <p>You requested a password reset for your account. Click the button below to reset it:</p>

    <a class="btn" href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}">
      Reset Password
    </a>

    <p>If you didn’t request this, you can ignore this email. Your password will not be changed.</p>

    <p>Thanks,<br>The ACG Team</p>
  </div>
</body>
</html>
